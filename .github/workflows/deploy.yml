name: Deploy to OVH via SFTP

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to OVH via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          password: ${{ secrets.OVH_PASSWORD }}
          local-dir: ./public/
          server-dir: /www/
          dangerous-clean-slate: true
        env:
          ENVIRONMENT: prod

      - name: Verify deployment
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://www.julian-sabos.com/)
          if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 403 ]; then
            echo "✅ Site is accessible (status: $STATUS)"
          else
            echo "⚠️  Unexpected status code: $STATUS"
          fi